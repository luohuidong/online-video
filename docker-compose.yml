services:
  server:
    build:
      context: .
      target: server
    volumes:
      # SQLite data persistence
      - online-video-data:/app/.data
      # Image cache
      - online-video-cache:/app/.cache
      # Mount config file (edit config.yml to configure sources)
      - ./config.yml:/app/config.yml:ro
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - '8000:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  online-video-data:
  online-video-cache:
